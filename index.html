<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RAiOSH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 1fr 90px; height: 100vh; background: #121212; color: white; }
    .sidebar { background: #000; padding: 20px; overflow-y: auto; }
    .logo { font-size: 22px; font-weight: bold; color: #1DB954; margin-bottom: 24px; }
    nav a { display: block; color: #b3b3b3; text-decoration: none; padding: 10px 0; font-size: 14px; }
    nav a:hover { color: white; }
    .section-label { font-size: 11px; color: #b3b3b3; margin: 20px 0 8px; letter-spacing: 1px; }
    .playlist-item { color: #b3b3b3; font-size: 13px; padding: 8px 6px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
    .playlist-item:hover { background: #181818; color: white; }
    .playlist-item.active { color: #1DB954; }
    .playlist-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .main { padding: 32px; overflow-y: auto; background: #121212; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #b3b3b3; font-size: 14px; margin-bottom: 20px; }
    .search-wrap { margin-bottom: 24px; }
    .search-wrap input { width: 100%; padding: 10px 16px; border-radius: 24px; border: none; background: #242424; color: white; font-size: 14px; outline: none; }
    .search-wrap input:focus { background: #2a2a2a; outline: 2px solid #1DB954; }
    .search-wrap input::placeholder { color: #b3b3b3; }
    h2 { font-size: 18px; margin-bottom: 16px; }
    .song-list { display: flex; flex-direction: column; gap: 4px; }
    .song-row { display: flex; align-items: center; gap: 16px; padding: 10px 12px; border-radius: 6px; cursor: pointer; }
    .song-row:hover { background: #282828; }
    .song-row.active { background: #1a3a1a; }
    .song-num { color: #b3b3b3; font-size: 14px; min-width: 20px; text-align: right; }
    .song-info { flex: 1; overflow: hidden; }
    .song-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-title.active { color: #1DB954; }
    .player { grid-column: 1 / -1; background: #181818; border-top: 1px solid #282828; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; gap: 16px; }
    .now-playing { display: flex; align-items: center; gap: 12px; min-width: 200px; }
    .now-icon { width: 44px; height: 44px; background: #1DB954; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .now-info { overflow: hidden; }
    .now-title { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .now-count { font-size: 12px; color: #b3b3b3; }
    .controls { display: flex; align-items: center; gap: 8px; }
    .controls button { background: none; border: none; color: #b3b3b3; font-size: 18px; cursor: pointer; padding: 8px; border-radius: 50%; transition: color 0.15s; }
    .controls button:hover { color: white; }
    .controls button.active { color: #1DB954; }
    #playBtn { color: white; font-size: 32px; }
    .progress-area { display: flex; align-items: center; gap: 10px; flex: 1; max-width: 380px; }
    .progress-bar { flex: 1; height: 4px; background: #535353; border-radius: 2px; cursor: pointer; }
    .progress-fill { height: 100%; background: #1DB954; border-radius: 2px; width: 0%; transition: width 0.3s linear; }
    .time { font-size: 12px; color: #b3b3b3; min-width: 35px; }
    .volume-area { display: flex; align-items: center; gap: 8px; min-width: 140px; }
    .volume-area button { background: none; border: none; color: #b3b3b3; font-size: 18px; cursor: pointer; }
    .volume-area button:hover { color: white; }
    input[type=range] { -webkit-appearance: none; height: 4px; border-radius: 2px; background: #535353; outline: none; cursor: pointer; flex: 1; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: white; cursor: pointer; }
  </style>
<link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1DB954" />
<body>

  <div class="sidebar">
    <div class="logo">♪ RAiOSH</div>
    <nav>
      <a href="#">🏠 Home</a>
      <a href="#">🔍 Search</a>
      <a href="#">📚 Your Library</a>
    </nav>
    <p class="section-label">YOUR SONGS</p>
    <div id="sidebarList"></div>
  </div>

  <div class="main">
    <h1>RAiOSH</h1>
    <p class="subtitle">6 songs</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="🔍  Search songs..." oninput="renderList()" />
    </div>
    <h2>All Songs</h2>
    <div class="song-list" id="songList"></div>
  </div>

  <div class="player">
    <div class="now-playing">
      <div class="now-icon">🎵</div>
      <div class="now-info">
        <div class="now-title" id="nowTitle">Select a song</div>
        <div class="now-count" id="nowCount">RAiOSH</div>
      </div>
    </div>
    <div>
      <div class="controls">
        <button id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
        <button onclick="prevSong()">⏮</button>
        <button id="playBtn" onclick="togglePlay()">▶</button>
        <button onclick="nextSong()">⏭</button>
        <button id="repeatBtn" onclick="toggleRepeat()">🔁</button>
      </div>
      <div class="progress-area" style="margin-top:8px;">
        <span class="time" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar" onclick="seek(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time" id="duration">0:00</span>
      </div>
    </div>
    <div class="volume-area">
      <button onclick="toggleMute()">🔊</button>
      <input type="range" id="volumeSlider" min="0" max="100" value="100" oninput="setVolume(this.value)" />
    </div>
  </div>

  <audio id="audio"></audio>

  <script>
    const songs = [
      { name: "Moonlight Kiss", url: "https://res.cloudinary.com/dmk9znonv/video/upload/v1779274805/Moonlight_Kiss_omgjya.mp3" },
      { name: "Jaat Ka Der", url: "https://res.cloudinary.com/dmk9znonv/video/upload/v1779274812/%E0%A4%9C%E0%A4%BE%E0%A4%9F_%E0%A4%95%E0%A4%BE_%E0%A4%A1%E0%A5%87%E0%A4%B0_a8zwsh.mp3" },
      { name: "Teri Baahon Mein", url: "https://res.cloudinary.com/dmk9znonv/video/upload/v1779274811/Teri_Baahon_Mein_fcnrru.mp3" },
      { name: "Chaati Ke Lagaai", url: "https://res.cloudinary.com/dmk9znonv/video/upload/v1779274810/song.mp3_z6zdvt.mp3" },
      { name: "Notebook Mein Dil", url: "https://res.cloudinary.com/dmk9znonv/video/upload/v1779274809/Notebook_Mein_Dil_lzagfu.mp3" },
      { name: "Ye Dhuniya Ek Chalava Hai", url: "https://res.cloudinary.com/dmk9znonv/video/upload/v1779274847/song_mrdo9j.mp3" }
    ];

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const repeatBtn = document.getElementById('repeatBtn');

    let currentIndex = -1;
    let shuffleOn = false;
    let repeatOn = false;

    function renderList() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = songs.filter(s => s.name.toLowerCase().includes(query));

      document.getElementById('songList').innerHTML = filtered.length === 0
        ? '<p style="color:#b3b3b3;padding:20px;">No songs match your search.</p>'
        : filtered.map(s => {
            const i = songs.indexOf(s);
            return `<div class="song-row ${i === currentIndex ? 'active' : ''}" onclick="playSong(${i})">
              <div class="song-num">${i === currentIndex ? '▶' : i + 1}</div>
              <div class="song-info">
                <div class="song-title ${i === currentIndex ? 'active' : ''}">${s.name}</div>
              </div>
            </div>`;
          }).join('');

      document.getElementById('sidebarList').innerHTML = songs.map((s, i) => `
        <div class="playlist-item ${i === currentIndex ? 'active' : ''}" onclick="playSong(${i})">
          <span>🎵</span><span>${s.name}</span>
        </div>
      `).join('');
    }

    function playSong(index) {
      currentIndex = index;
      audio.src = songs[index].url;
      audio.play();
      playBtn.textContent = '⏸';
      document.getElementById('nowTitle').textContent = songs[index].name;
      document.getElementById('nowCount').textContent = (index + 1) + ' of ' + songs.length;
      renderList();
    }

    function togglePlay() {
      if (currentIndex === -1) { playSong(0); return; }
      if (audio.paused) { audio.play(); playBtn.textContent = '⏸'; }
      else { audio.pause(); playBtn.textContent = '▶'; }
    }

    function nextSong() {
      if (shuffleOn) {
        let r;
        do { r = Math.floor(Math.random() * songs.length); } while (songs.length > 1 && r === currentIndex);
        playSong(r);
      } else {
        playSong((currentIndex + 1) % songs.length);
      }
    }

    function prevSong() {
      if (audio.currentTime > 3) { audio.currentTime = 0; return; }
      playSong((currentIndex - 1 + songs.length) % songs.length);
    }

    function toggleShuffle() {
      shuffleOn = !shuffleOn;
      shuffleBtn.classList.toggle('active', shuffleOn);
    }

    function toggleRepeat() {
      repeatOn = !repeatOn;
      repeatBtn.classList.toggle('active', repeatOn);
    }

    function setVolume(val) {
      audio.volume = val / 100;
      document.querySelector('.volume-area button').textContent = val == 0 ? '🔇' : val < 50 ? '🔉' : '🔊';
    }

    function toggleMute() {
      audio.muted = !audio.muted;
      document.querySelector('.volume-area button').textContent = audio.muted ? '🔇' : '🔊';
    }

    audio.addEventListener('timeupdate', function() {
      progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
      durationEl.textContent = formatTime(audio.duration);
    });

    function seek(e) {
      if (!audio.duration) return;
      audio.currentTime = ((e.clientX - progressBar.getBoundingClientRect().left) / progressBar.offsetWidth) * audio.duration;
    }

    function formatTime(s) {
      if (isNaN(s)) return '0:00';
      return Math.floor(s / 60) + ':' + (Math.floor(s % 60) < 10 ? '0' : '') + Math.floor(s % 60);
    }

    audio.addEventListener('ended', function() {
      if (repeatOn) { audio.currentTime = 0; audio.play(); }
      else nextSong();
    });

    renderList();
  </script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/raiosh/sw.js');
  }
</script>
</html>
